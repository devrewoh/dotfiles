# Minimal Alacritty config for Go development
# Using TOML format (current standard)

[window]
# opacity = 0.9
# decorations = "full"
[window.padding]
x = 2
y = 2

[font]
# family = "JetBrains Mono"
# family = "Fira Code" 
# family = "Source Code Pro"
size = 12

# Colors (uncomment to customize)
# [colors.primary]
# background = "0x1e1e1e"
# foreground = "0xd4d4d4"

# Key bindings for tmux workflow
# [[keyboard.bindings]]
# key = "Return"
# mods = "Super"
# action = "SpawnNewInstance"

# Scrolling
# [scrolling]
# history = 10000
