# Minimal Alacritty config for Go development
# Using TOML format (current standard)

[window]
# opacity = 0.9
# decorations = "full"
[window.padding]
x = 2
y = 2

[font]
normal = { family = "FiraCode Nerd Font", style = "Regular" }
bold = { family = "FiraCode Nerd Font", style = "Bold" }
italic = { family = "FiraCode Nerd Font", style = "Italic" }
size = 12.0

# Colors (uncomment to customize)
# [colors.primary]
# background = "0x1e1e1e"
# foreground = "0xd4d4d4"

# Key bindings for tmux workflow
# [[keyboard.bindings]]
# key = "Return"
# mods = "Super"
# action = "SpawnNewInstance"

# Scrolling
# [scrolling]
# history = 10000
